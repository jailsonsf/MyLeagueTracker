spring.application.name=leaguetracker_backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/league_tracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:leaguetracker_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:leaguetracker_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

api.security.token.secret=${JWT_SECRET:mysecretkey}
