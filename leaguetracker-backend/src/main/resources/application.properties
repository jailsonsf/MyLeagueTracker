spring.application.name=leaguetracker_backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/league_tracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:leaguetracker_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:leaguetracker_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
