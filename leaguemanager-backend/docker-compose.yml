services:
  db:
    image: postgres:15
    container_name: postgres_leaguemanager
    restart: always
    environment:
      POSTGRES_USER: leaguemanager_admin
      POSTGRES_PASSWORD: eaguemanager_passwor
      POSTGRES_DB: league_manager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: spring_leaguemanager_api
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/league_manager
      SPRING_DATASOURCE_USERNAME: leaguemanager_admin
      SPRING_DATASOURCE_PASSWORD: leaguemanager_password

volumes:
  pgdata:
